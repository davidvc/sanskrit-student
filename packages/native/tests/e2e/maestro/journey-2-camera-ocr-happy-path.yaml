appId: com.sanskritstudent.app
---
# Journey 2: Camera OCR Translation (happy path)
# Prerequisites: app installed, backend running
#
# Note: The iOS Simulator camera shows a pre-rendered fake scene (not a real camera feed).
# There is no CLI mechanism to inject a custom image as the live camera source.
# As a result, the OCR input will be whatever text the simulator scene contains
# (often timestamps or overlay text), not actual Sanskrit. These tests verify the
# camera → OCR → display pipeline works correctly, not OCR accuracy with Sanskrit text.
- launchApp:
    clearState: true
    permissions:
      camera: allow
- waitForAnimationToEnd

# Assert home screen
- assertVisible: "Sanskrit Student"
- assertVisible: "Photograph Text (OCR)"

# Navigate to camera screen
- tapOn: "Photograph Text (OCR)"

# Assert camera view is shown (permission pre-granted via launchApp)
- extendedWaitUntil:
    visible:
      id: "camera-view"
    timeout: 5000

# Dismiss lighting tip if shown (first run)
- tapOn:
    id: "dismiss-tip-button"
    optional: true

# Capture a photo
- tapOn:
    id: "shutter-button"

# Assert photo preview with crop overlay appears
- extendedWaitUntil:
    visible:
      id: "photo-preview"
    timeout: 5000
- assertVisible: "Select the region to translate"
- assertVisible:
    id: "use-photo-button"

# Tap Translate
- tapOn:
    id: "use-photo-button"

# Assert processing progress — "Translating..." is the durable state during the API call
- extendedWaitUntil:
    visible: "Translating..."
    timeout: 10000

# Wait for navigation to translate screen with results
- extendedWaitUntil:
    visible: "Original Text:"
    timeout: 60000
- assertVisible: "IAST:"
- assertVisible: "Word Breakdown:"
