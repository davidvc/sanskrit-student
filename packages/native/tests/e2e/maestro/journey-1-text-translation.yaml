appId: com.sanskritstudent.app
---
# Journey 1: Text Translation (happy path)
# Prerequisites: app installed, backend running
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Assert home screen
- assertVisible: "Sanskrit Student"
- assertVisible: "Start Translating"

# Navigate to translate screen
- tapOn: "Start Translating"

# Wait for translate screen to load
- extendedWaitUntil:
    visible:
      id: "sanskrit-input"
    timeout: 5000

# Enter Sanskrit text
- tapOn:
    id: "sanskrit-input"
- inputText: "नमस्ते"

# Trigger translation
- tapOn:
    id: "translate-button"

# Wait for and assert translation results
- extendedWaitUntil:
    visible: "Original Text:"
    timeout: 30000
- assertVisible: "IAST:"
- assertVisible: "Word Breakdown:"
